<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            height: 100vh;
            overflow: hidden;
        }

        .left-side {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .left-content {
            max-width: 500px;
        }

        .right-side {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }

    </style>

</head>

<body>

<div class="container-fluid h-100">

    <div class="row h-100">

        <!-- LADO ESQUERDO -->

        <div class="col-md-8 left-side">

            <div class="left-content">

                <h1 class="display-3 fw-bold mb-4">
                    SysClinic
                </h1>

                <p class="fs-4">
                    Sistema de gerenciamento clínico desenvolvido
                    com Spring Boot, JWT, Thymeleaf e MySQL.
                </p>

            </div>

        </div>

        <!-- LADO DIREITO -->

        <div class="col-md-4 right-side">

            <div class="card shadow p-4 login-card">

                <h2 class="mb-4 text-center">
                    Login
                </h2>

                <input type="text"
                       id="login"
                       class="form-control mb-3"
                       placeholder="Login">

                <input type="password"
                       id="senha"
                       class="form-control mb-4"
                       placeholder="Senha">

                <button class="btn btn-primary w-100"
                        onclick="fazerLogin()">

                    Entrar

                </button>

            </div>

        </div>

    </div>

</div>

<script src="/js/auth.js"></script>

</body>
</html>
