<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Login SysClinic</h2>

        <input type="text"
               id="login"
               class="form-control mb-3"
               placeholder="Login">

        <input type="password"
               id="senha"
               class="form-control mb-3"
               placeholder="Senha">

        <button class="btn btn-primary w-100"
                onclick="fazerLogin()">
            Entrar
        </button>

    </div>

</div>

<script src="/js/auth.js"></script>

</body>
</html>
