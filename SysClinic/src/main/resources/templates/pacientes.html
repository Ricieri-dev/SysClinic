<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Pacientes - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

    </style>

</head>

<body>

<div class="header d-flex justify-content-between align-items-center">

    <h2>Pacientes</h2>

    <button class="btn btn-light"
            onclick="logout()">

        Sair

    </button>

</div>

<div class="container mt-4">

    <div class="card shadow p-4"><!- inicio cadastra paciente ->
        <h4 class="mb-4">Cadastrar Paciente</h4>

        <div class="row mb-4">

            <div class="col-md-3">
                <input type="text"
                       id="nome"
                       class="form-control"
                       placeholder="Nome">
            </div>

            <div class="col-md-2">
                <input type="text"
                       id="cpf"
                       class="form-control"
                       placeholder="CPF">
            </div>

            <div class="col-md-2">
                <input type="text"
                       id="telefone"
                       class="form-control"
                       placeholder="Telefone">
            </div>

            <div class="col-md-3">
                <input type="email"
                       id="email"
                       class="form-control"
                       placeholder="Email">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100"
                        onclick="cadastrarPaciente()">

                    Salvar

                </button>
            </div>

        </div>
        </div>

        <div class="card shadow p-4">

        <table class="table table-striped">

            <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Ações</th>

            </tr>

            </thead>

            <tbody id="tabelaPacientes">

            </tbody>

        </table>

    </div>

</div>

<script src="/js/pacientes.js"></script>

</body>
</html>
