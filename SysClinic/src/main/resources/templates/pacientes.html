<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Pacientes - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

    </style>

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row vh-100">

        <!-- SIDEBAR -->

        <div class="col-2 bg-dark text-white p-4">

            <h3 class="mb-5">
                SysClinic
            </h3>

            <div class="d-grid gap-2">

                <a href="/pacientes-view"
                   class="btn btn-outline-light text-start">

                    Pacientes

                </a>

                <a href="/medicos-view"
                   class="btn btn-outline-light text-start">

                    Médicos

                </a>

                <a href="/consultas-view"
                   class="btn btn-outline-light text-start">

                    Consultas

                </a>

                <button class="btn btn-danger mt-5"
                        onclick="logout()">

                    Sair

                </button>

            </div>

        </div>

        <!-- CONTEÚDO -->

        <div class="col-10 p-4">

            <!-- HEADER -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2>
                    Pacientes
                </h2>

                <span class="text-secondary">
                    Painel Administrativo
                </span>

            </div>

            <!-- FORMULÁRIO -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">



                    <div class="card shadow-sm border-0 mb-4">

                        <div class="card-body">

                            <h4 class="mb-4">
                                Cadastrar Paciente
                            </h4>

                            <div class="row mb-4">

                                <div class="col-md-3">
                                    <input type="text"
                                           id="nome"
                                           class="form-control"
                                           placeholder="Nome">
                                </div>

                                <div class="col-md-2">
                                    <input type="text"
                                           id="cpf"
                                           class="form-control"
                                           placeholder="CPF">
                                </div>

                                <div class="col-md-2">
                                    <input type="text"
                                           id="telefone"
                                           class="form-control"
                                           placeholder="Telefone">
                                </div>

                                <div class="col-md-3">
                                    <input type="email"
                                           id="email"
                                           class="form-control"
                                           placeholder="Email">
                                </div>

                                <div class="col-md-2">
                                    <button class="btn btn-success w-100"
                                            onclick="cadastrarPaciente()">

                                        Salvar

                                    </button>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABELA -->

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <table class="table table-striped">

                                <thead class="table-dark">

                                <tr>

                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>CPF</th>
                                    <th>Email</th>
                                    <th>Telefone</th>
                                    <th>Ações</th>

                                </tr>

                                </thead>

                                <tbody id="tabelaPacientes">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/js/pacientes.js"></script>

</body>
</html>
