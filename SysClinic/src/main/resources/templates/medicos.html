<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Médicos - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

    </style>

</head>

<body>

<div class="header d-flex justify-content-between align-items-center">

    <h2>Médicos</h2>

    <button class="btn btn-light"
            onclick="logout()">

        Sair

    </button>

</div>

<div class="container mt-4">

    <!-- FORMULÁRIO -->

    <div class="card shadow p-4 mb-4">

        <h4 class="mb-4">Cadastrar Médico</h4>

        <div class="row">

            <div class="col-md-3">
                <input type="text"
                       id="nome"
                       class="form-control"
                       placeholder="Nome">
            </div>

            <div class="col-md-2">
                <input type="text"
                       id="especialidade"
                       class="form-control"
                       placeholder="Especialidade">
            </div>

            <div class="col-md-2">
                <input type="text"
                       id="crm"
                       class="form-control"
                       placeholder="CRM">
            </div>

            <div class="col-md-2">
                <input type="text"
                       id="telefone"
                       class="form-control"
                       placeholder="Telefone">
            </div>

            <div class="col-md-2">
                <input type="email"
                       id="email"
                       class="form-control"
                       placeholder="Email">
            </div>

            <div class="col-md-1">
                <button class="btn btn-success w-90"
                        onclick="cadastrarMedico()">

                    Salvar

                </button>
            </div>

        </div>

    </div>

    <!-- TABELA -->

    <div class="card shadow p-4">

        <table class="table table-striped">

            <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>CRM</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Ações</th>

            </tr>

            </thead>

            <tbody id="tabelaMedicos">

            </tbody>

        </table>

    </div>

</div>

<script src="/js/medicos.js"></script>

</body>
</html>
