<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Médicos - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

    </style>

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row vh-100">

        <!-- SIDEBAR -->

        <div class="col-2 bg-dark text-white p-4 d-flex flex-column">

            <h2 class="mb-5">
                SysClinic
            </h2>

            <div class="d-grid gap-3">

                <a href="/pacientes-view"
                   class="btn btn-outline-light text-start">

                    Pacientes

                </a>

                <a href="/medicos-view"
                   class="btn btn-outline-light text-start active">

                    Médicos

                </a>

                <a href="/consultas-view"
                   class="btn btn-outline-light text-start">

                    Consultas

                </a>

            </div>

            <button class="btn btn-danger mt-auto"
                    onclick="logout()">

                Sair

            </button>

        </div>

        <!-- CONTEÚDO -->

        <div class="col-10 p-4">

            <!-- HEADER -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h1>
                    Médicos
                </h1>

                <span class="text-secondary fs-4">
                    Painel Administrativo
                </span>

            </div>

            <!-- FORMULÁRIO -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">

                    <h3 class="mb-4">
                        Cadastrar Médico
                    </h3>

                    <div class="row g-3">

                        <div class="col-md-3">

                            <input type="text"
                                   id="nome"
                                   class="form-control"
                                   placeholder="Nome">

                        </div>

                        <div class="col-md-2">

                            <input type="text"
                                   id="especialidade"
                                   class="form-control"
                                   placeholder="Especialidade">

                        </div>

                        <div class="col-md-2">

                            <input type="text"
                                   id="crm"
                                   class="form-control"
                                   placeholder="CRM">

                        </div>

                        <div class="col-md-2">

                            <input type="text"
                                   id="telefone"
                                   class="form-control"
                                   placeholder="Telefone">

                        </div>

                        <div class="col-md-2">

                            <input type="email"
                                   id="email"
                                   class="form-control"
                                   placeholder="Email">

                        </div>

                        <div class="col-md-1">

                            <button class="btn btn-success w-100"
                                    onclick="cadastrarMedico()">

                                Salvar

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABELA -->

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <table class="table table-striped align-middle">

                        <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Nome</th>
                            <th>Especialidade</th>
                            <th>CRM</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Ações</th>

                        </tr>

                        </thead>

                        <tbody id="tabelaMedicos">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/js/medicos.js"></script>

</body>
</html>
