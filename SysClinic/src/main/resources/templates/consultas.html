<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Consultas - SysClinic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

    </style>

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row vh-100">

        <!-- SIDEBAR -->

        <div class="col-2 bg-dark text-white p-4 d-flex flex-column">

            <h2 class="mb-5">
                SysClinic
            </h2>

            <div class="d-grid gap-3">

                <a href="/pacientes-view"
                   class="btn btn-outline-light text-start">

                    Pacientes

                </a>

                <a href="/medicos-view"
                   class="btn btn-outline-light text-start">

                    Médicos

                </a>

                <a href="/consultas-view"
                   class="btn btn-outline-light text-start active">

                    Consultas

                </a>

            </div>

            <button class="btn btn-danger mt-auto"
                    onclick="logout()">

                Sair

            </button>

        </div>

        <!-- CONTEÚDO -->

        <div class="col-10 p-4">

            <!-- HEADER -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h1>
                    Consultas
                </h1>

                <span class="text-secondary fs-4">
                    Painel Administrativo
                </span>

            </div>

            <!-- FORMULÁRIO -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">

                    <h3 class="mb-4">
                        Agendar Consulta
                    </h3>

                    <div class="row g-3">

                        <!-- PACIENTE -->

                        <div class="col-md-3">

                            <label class="form-label">
                                Paciente
                            </label>

                            <select id="pacienteId"
                                    class="form-select">

                                <option value="">
                                    Selecione
                                </option>

                            </select>

                        </div>

                        <!-- MÉDICO -->

                        <div class="col-md-3">

                            <label class="form-label">
                                Médico
                            </label>

                            <select id="medicoId"
                                    class="form-select">

                                <option value="">
                                    Selecione
                                </option>

                            </select>

                        </div>

                        <!-- DATA/HORA -->

                        <div class="col-md-2">

                            <label class="form-label">
                                Data/Hora
                            </label>

                            <input type="datetime-local"
                                   id="dataHora"
                                   class="form-control">

                        </div>

                        <!-- STATUS -->

                        <div class="col-md-2">

                            <label class="form-label">
                                Status
                            </label>

                            <select id="status"
                                    class="form-select">

                                <option value="AGENDADA">
                                    AGENDADA
                                </option>

                                <option value="REALIZADA">
                                    REALIZADA
                                </option>

                                <option value="CANCELADA">
                                    CANCELADA
                                </option>

                            </select>

                        </div>

                        <!-- BOTÃO -->

                        <div class="col-md-2 d-flex align-items-end">

                            <button class="btn btn-success w-100"
                                    onclick="salvarConsulta()">

                                Salvar

                            </button>

                        </div>

                        <!-- OBSERVAÇÃO -->

                        <div class="col-md-12">

                            <label class="form-label">
                                Observação
                            </label>

                            <textarea id="observacao"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Observações da consulta"></textarea>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABELA -->

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <table class="table table-striped align-middle">

                        <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Médico</th>
                            <th>Data/Hora</th>
                            <th>Status</th>
                            <th>Observação</th>
                            <th>Ações</th>

                        </tr>

                        </thead>

                        <tbody id="tabelaConsultas">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/js/consultas.js"></script>

</body>
</html>
